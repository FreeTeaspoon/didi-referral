<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DiDi Referral Claimer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1><span>DiDi</span> Referral Claimer</h1>
      <p class="subtitle">Enter a phone number and claim referral discounts</p>

      <div class="card">
        <label>Phone Number</label>
        <div class="phone-row">
          <div class="code-field">
            <input
              type="text"
              id="countryCallingCode"
              value="+61"
              placeholder="+61"
            />
          </div>
          <div class="number-field">
            <input type="tel" id="cell" autofocus />
          </div>
        </div>
      </div>

      <div class="card" id="uidCard">
        <div class="field-grid">
          <div class="field-group">
            <label>UID(s)</label>
            <input type="text" id="uid" value="369436974820549" />
          </div>
          <div class="field-group">
            <label>TC ID List</label>
            <input type="text" id="tcIdList" value="2602" />
          </div>
        </div>

        <div class="toggles-row">
          <div class="toggle-group">
            <label for="randomUidToggle">Random UIDs</label>
            <input type="checkbox" id="randomUidToggle" class="toggle-input" checked />
            <label for="randomUidToggle" class="toggle-switch"><span class="toggle-knob"></span></label>
          </div>
          <div class="toggle-group">
            <label for="manualEntryToggle">Manual Entry</label>
            <input type="checkbox" id="manualEntryToggle" class="toggle-input" />
            <label for="manualEntryToggle" class="toggle-switch"><span class="toggle-knob"></span></label>
          </div>
        </div>
      </div>

      <div class="card" id="countryCityCard">
        <div class="field-grid">
          <div class="field-group">
            <label>Country</label>
            <select id="countrySelect"></select>
            <div class="city-info" id="cityInfoDiscount" style="display: none">
              <div class="info-piece">
                <span class="info-label">Referee gets</span>
                <span class="info-val" id="cityDiscount"></span>
              </div>
            </div>
          </div>
          <div class="field-group">
            <label>City</label>
            <select id="citySelect"></select>
            <div class="city-info" id="cityInfoReferrer" style="display: none">
              <div class="info-piece">
                <span class="info-label">Referrer gets</span>
                <span class="info-val" id="cityReferrer"></span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="card" id="manualFields" style="display: none">
        <div class="field-grid">
          <div class="field-group">
            <label>Activity ID</label>
            <input type="text" id="activityId" value="102602022" />
          </div>
          <div class="field-group">
            <label>Activity Type</label>
            <input type="number" id="activityType" value="26" />
          </div>
          <div class="field-group">
            <label>City ID</label>
            <input type="number" id="cityId" value="61050200" />
          </div>
          <div class="field-group">
            <label>County ID</label>
            <input type="number" id="countyId" value="0" />
          </div>
          <div class="field-group">
            <label>Country Code</label>
            <input type="text" id="countryCode" value="AU" />
          </div>
        </div>
      </div>

      <div class="card" id="otpCard" style="display: none">
        <label>Verification Code</label>
        <div class="otp-row">
          <div class="otp-field">
            <input type="text" id="otpCode" placeholder="Enter OTP" maxlength="6" inputmode="numeric" />
          </div>
          <button class="btn btn-send" id="sendCodeBtn">Send Code</button>
        </div>
      </div>

      <button class="btn" id="claimBtn">Claim Discount</button>

      <div class="progress" id="progress" style="display: none" role="status">
        <div class="step" id="stepOtp" style="display: none">
          <span class="dot"></span> Sending OTP...
        </div>
        <div class="step" id="step2">
          <span class="dot"></span> Joining referral...
        </div>
        <div class="step" id="step3">
          <span class="dot"></span> Fetching rewards...
        </div>
      </div>

      <div class="result-card" id="resultCard" aria-live="polite">
        <div class="result-header" id="resultHeader">
          <span class="badge" id="resultBadge"></span>
          <span class="msg" id="resultMsg"></span>
        </div>
        <div class="result-body" id="resultBody"></div>
      </div>
    </div>

    <script src="cities.js"></script>
    <script src="app.js"></script>
  </body>
</html>
