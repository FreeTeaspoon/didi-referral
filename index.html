<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DiDi Referral Claimer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1><span>DiDi</span> Referral Claimer</h1>
      <p class="subtitle">Enter a phone number and claim referral discounts</p>

      <div class="card">
        <label>Phone Number</label>
        <div class="phone-row">
          <div class="code-field">
            <input
              type="text"
              id="countryCallingCode"
              value="+61"
              placeholder="+61"
            />
          </div>
          <div class="number-field">
            <input type="tel" id="cell" placeholder="4XX XXX XXX" autofocus />
          </div>
        </div>

        <button
          class="toggle-advanced"
          id="toggleBtn"
          type="button"
          aria-expanded="false"
          aria-controls="advancedFields"
        >
          <span class="arrow">&#9654;</span> Advanced Settings
        </button>

        <div class="advanced-fields" id="advancedFields">
          <div class="field-grid">
            <div class="field-group full">
              <label>UID(s)</label>
              <input type="text" id="uid" value="369436974820549" />
              <div class="field-hint">
                Comma-separated — tries each in order on retry
              </div>
              <div class="checkbox-group">
                <input type="checkbox" id="randomUidToggle" checked />
                <label for="randomUidToggle"
                  >Use random UIDs after exhausting the list</label
                >
              </div>
            </div>
            <div class="field-group">
              <label>Country</label>
              <select id="countrySelect"></select>
              <div
                class="city-info"
                id="cityInfoDiscount"
                style="display: none"
              >
                <div class="info-piece">
                  <span class="info-label">Referee gets</span>
                  <span class="info-val" id="cityDiscount"></span>
                </div>
              </div>
            </div>
            <div class="field-group">
              <label>City</label>
              <select id="citySelect"></select>
              <div
                class="city-info"
                id="cityInfoReferrer"
                style="display: none"
              >
                <div class="info-piece">
                  <span class="info-label">Referrer gets</span>
                  <span class="info-val" id="cityReferrer"></span>
                </div>
              </div>
            </div>
            <div
              class="field-group manual-only"
              id="manualFields"
              style="display: none; grid-column: 1/-1"
            >
              <div class="field-grid">
                <div class="field-group">
                  <label>Activity ID</label>
                  <input type="text" id="activityId" value="102602022" />
                </div>
                <div class="field-group">
                  <label>Activity Type</label>
                  <input type="number" id="activityType" value="26" />
                </div>
                <div class="field-group">
                  <label>City ID</label>
                  <input type="number" id="cityId" value="61050200" />
                </div>
                <div class="field-group">
                  <label>County ID</label>
                  <input type="number" id="countyId" value="0" />
                </div>
              </div>
            </div>
            <div class="field-group">
              <label>Country Code</label>
              <input type="text" id="countryCode" value="AU" />
            </div>
            <div class="field-group">
              <label>TC ID List (comma-sep)</label>
              <input type="text" id="tcIdList" value="2602" />
            </div>
          </div>
        </div>
      </div>

      <button class="btn" id="claimBtn">Claim Discount</button>

      <div class="progress" id="progress" style="display: none" role="status">
        <div class="step" id="step2">
          <span class="dot"></span> Joining referral...
        </div>
        <div class="step" id="step3">
          <span class="dot"></span> Fetching rewards...
        </div>
      </div>

      <div class="result-card" id="resultCard" aria-live="polite">
        <div class="result-header" id="resultHeader">
          <span class="badge" id="resultBadge"></span>
          <span class="msg" id="resultMsg"></span>
        </div>
        <div class="result-body" id="resultBody"></div>
      </div>
    </div>

    <script src="cities.js"></script>
    <script src="app.js"></script>
  </body>
</html>
